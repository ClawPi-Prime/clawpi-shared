<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legion TD Web — Prototype</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #eee; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; }
  #topbar { display: flex; gap: 40px; padding: 8px 20px; background: #16213e; width: 100%; justify-content: center; font-size: 17px; font-weight: bold; border-bottom: 2px solid #0f3460; }
  .stat span:first-child { color: #aaa; font-size: 12px; font-weight: normal; margin-right: 5px; }
  #gold-val { color: #FFD700; }
  #king-val { color: #e74c3c; }
  #wave-val { color: #3498db; }
  #canvas-wrap { flex: 1; display: flex; align-items: center; justify-content: center; gap: 16px; }
  canvas { display: block; cursor: crosshair; }
  #king-canvas { display: block; cursor: default; }
  #bottombar { display: flex; gap: 10px; padding: 8px 20px; background: #16213e; width: 100%; justify-content: center; align-items: center; border-top: 2px solid #0f3460; flex-wrap: wrap; }
  .unit-btn { padding: 7px 14px; border: 2px solid #444; border-radius: 6px; background: #0f3460; color: #eee; cursor: pointer; font-size: 12px; transition: all 0.2s; }
  .unit-btn:hover { border-color: #aaa; background: #1a4a8a; }
  .unit-btn.selected { border-color: #fff; background: #1a4a8a; box-shadow: 0 0 8px rgba(255,255,255,0.3); }
  .unit-btn .cost { color: #FFD700; font-size: 10px; }
  #start-btn { padding: 9px 22px; border: none; border-radius: 8px; background: #27ae60; color: #fff; font-size: 14px; font-weight: bold; cursor: pointer; }
  #start-btn:hover { background: #2ecc71; }
  #start-btn:disabled { background: #555; cursor: default; }
</style>
</head>
<body>
<div id="topbar">
  <div class="stat"><span>WAVE</span><span id="wave-val">1</span></div>
  <div class="stat"><span>GOLD</span><span id="gold-val">50g</span></div>
  <div class="stat"><span>KING HP</span><span id="king-val">100</span></div>
  <div class="stat"><span>PHASE</span><span id="phase-label">BUILD 30s</span></div>
</div>
<div id="canvas-wrap">
  <canvas id="gameCanvas"></canvas>
  <canvas id="king-canvas"></canvas>
</div>
<div id="bottombar">
  <button class="unit-btn" data-type="archer">🏹 Archer<br><span class="cost">10g | DMG:8 | RNG:3</span></button>
  <button class="unit-btn" data-type="knight">⚔️ Knight<br><span class="cost">25g | DMG:20 | RNG:1.5</span></button>
  <button class="unit-btn" data-type="mage">🔮 Mage<br><span class="cost">40g | DMG:35 | RNG:4</span></button>
  <button class="unit-btn" data-type="cannon">💣 Cannon<br><span class="cost">60g | DMG:60 | RNG:3</span></button>
  <button id="start-btn">▶ Start Wave</button>
</div>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const kCanvas = document.getElementById('king-canvas');
const kCtx = kCanvas.getContext('2d');

const COLS = 12, ROWS = 22; // 2 extra rows: row 0 = spawn zone, row 21 = exit portal zone
let TILE = 32;
const GAME_SPEED = 2;

// Layout:
// Row 0: spawn zone (enemy entry)
// Rows 1-19: play area
// Row 20-21: exit portal zone
const SPAWN_ROW = 0;
const EXIT_ROW = 21;
const LANE_COL = 5; // lane occupies cols 5-6
const LANE_X = 5.5; // center in tiles

// King room dimensions (separate canvas)
const KING_COLS = 8, KING_ROWS = 8;

function resize() {
  const wrap = document.getElementById('canvas-wrap');
  const availW = wrap.clientWidth - 40;
  const availH = wrap.clientHeight - 10;
  // King room takes ~30% width
  const kingFraction = 0.28;
  const mainFraction = 0.72;
  const tileByW = Math.floor((availW * mainFraction) / COLS);
  const tileByH = Math.floor(availH / ROWS);
  TILE = Math.max(20, Math.min(tileByW, tileByH));
  canvas.width = COLS * TILE;
  canvas.height = ROWS * TILE;
  const kt = Math.floor(Math.min((availW * kingFraction) / KING_COLS, availH / KING_ROWS));
  kCanvas.width = KING_COLS * kt;
  kCanvas.height = KING_ROWS * kt;
  kCanvas._tile = kt;
}
resize();
window.addEventListener('resize', resize);

const UNIT_DEFS = {
  archer: { cost:10, hp:50,  dmg:8,  range:3,   atkSpeed:1.0, moveSpeed:1.8, color:'#4CAF50' },
  knight: { cost:25, hp:150, dmg:20, range:1.5,  atkSpeed:0.8, moveSpeed:2.2, color:'#2196F3' },
  mage:   { cost:40, hp:80,  dmg:35, range:4,    atkSpeed:0.5, moveSpeed:1.5, color:'#9C27B0' },
  cannon: { cost:60, hp:120, dmg:60, range:3,    atkSpeed:0.3, moveSpeed:1.2, color:'#FF5722' },
};

let gold = 50, kingHp = 100, maxKingHp = 100, wave = 1;
let phase = 'build', buildTimer = 30, lastTime = 0;
let units = [], enemies = [], leakedEnemies = [], particles = [], kingParticles = [];
let selectedType = null, hoverCell = null, buildInterval = null;

function isOccupied(col, row) {
  return units.some(u => u.homeCol === col && u.homeRow === row);
}
function isPlayArea(col, row) {
  return col >= 0 && col < COLS && row >= 1 && row <= 19 && !isOccupied(col, row);
}

function makeUnit(col, row, type) {
  const d = UNIT_DEFS[type];
  return {
    homeCol: col, homeRow: row,
    x: (col + 0.5) * TILE, y: (row + 0.5) * TILE,
    type, color: d.color,
    hp: d.hp, maxHp: d.hp, dmg: d.dmg, range: d.range,
    atkSpeed: d.atkSpeed, moveSpeed: d.moveSpeed * TILE,
    atkCooldown: 0, flashT: 0, alive: true,
  };
}

function spawnWave() {
  const count = 8 + (wave - 1) * 3;
  const hp = Math.round(30 * Math.pow(1.2, wave - 1));
  const speed = (1 + (wave - 1) * 0.05) * TILE * 0.6;
  // Spawn in spawn zone row 0
  for (let i = 0; i < count; i++) {
    enemies.push({
      x: (LANE_X + 0.5) * TILE,
      y: (-i * 50 - 20), // enter from above row 0
      hp, maxHp: hp, speed,
      dead: false, leaked: false, flashT: 0, atkCooldown: 0,
    });
  }
}

function startWave() {
  if (phase !== 'build') return;
  clearInterval(buildInterval); buildInterval = null;
  phase = 'combat'; spawnWave();
  document.getElementById('start-btn').disabled = true;
  updateUI();
}

function startBuildPhase() {
  phase = 'build'; buildTimer = 30;
  for (const u of units) {
    u.x = (u.homeCol + 0.5) * TILE; u.y = (u.homeRow + 0.5) * TILE;
    u.hp = u.maxHp; u.alive = true; u.flashT = 0; u.atkCooldown = 0;
  }
  leakedEnemies = [];
  document.getElementById('start-btn').disabled = false; updateUI();
  buildInterval = setInterval(() => { buildTimer--; updateUI(); if (buildTimer <= 0) startWave(); }, 1000);
}

function updateUI() {
  document.getElementById('wave-val').textContent = wave;
  document.getElementById('gold-val').textContent = gold + 'g';
  document.getElementById('king-val').textContent = kingHp;
  const pl = document.getElementById('phase-label');
  pl.textContent = phase === 'build' ? `BUILD ${buildTimer}s` : phase === 'combat' ? 'COMBAT' : 'INCOME';
}

document.querySelectorAll('.unit-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const t = btn.dataset.type;
    selectedType = selectedType === t ? null : t;
    document.querySelectorAll('.unit-btn').forEach(b => b.classList.toggle('selected', b.dataset.type === selectedType));
  });
});
document.getElementById('start-btn').addEventListener('click', startWave);
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  hoverCell = { col: Math.floor((e.clientX - r.left) / TILE), row: Math.floor((e.clientY - r.top) / TILE) };
});
canvas.addEventListener('mouseleave', () => hoverCell = null);
canvas.addEventListener('click', e => {
  if (phase !== 'build' || !selectedType) return;
  const r = canvas.getBoundingClientRect();
  const col = Math.floor((e.clientX - r.left) / TILE), row = Math.floor((e.clientY - r.top) / TILE);
  if (!isPlayArea(col, row)) { particles.push({ x: canvas.width/2, y: 100, text: 'Place in play area!', t:1.2, color:'#e74c3c', big:true }); return; }
  if (gold < UNIT_DEFS[selectedType].cost) { particles.push({ x: canvas.width/2, y: 100, text: 'Not enough gold!', t:1.2, color:'#e74c3c', big:true }); return; }
  gold -= UNIT_DEFS[selectedType].cost;
  units.push(makeUnit(col, row, selectedType));
  updateUI();
});

function dist(ax, ay, bx, by) { return Math.hypot(ax - bx, ay - by); }
function moveTo(obj, tx, ty, spd, dt) {
  const dx = tx - obj.x, dy = ty - obj.y, d = Math.hypot(dx, dy);
  if (d < 1) return;
  const s = Math.min(spd * dt, d);
  obj.x += (dx/d)*s; obj.y += (dy/d)*s;
}

function update(dt) {
  if (phase !== 'combat') return;
  dt *= GAME_SPEED;

  // --- Units move & attack ---
  for (const u of units) {
    if (!u.alive) continue;
    if (u.flashT > 0) u.flashT -= dt;
    if (u.atkCooldown > 0) u.atkCooldown -= dt;

    let closest = null, closestDist = Infinity;
    let nearestEnemy = null, nearestDist = Infinity;
    for (const e of enemies) {
      if (e.dead || e.leaked) continue;
      const d = dist(u.x, u.y, e.x, e.y);
      if (d <= u.range * TILE && d < closestDist) { closest = e; closestDist = d; }
      if (d < nearestDist) { nearestEnemy = e; nearestDist = d; }
    }

    if (closest && u.atkCooldown <= 0) {
      u.atkCooldown = 1 / u.atkSpeed; u.flashT = 0.1;
      closest.hp -= u.dmg; closest.flashT = 0.12;
      particles.push({ x: closest.x, y: closest.y - 18, text: `-${u.dmg}`, t:0.9, color:'#FF6B6B' });
      if (closest.hp <= 0) { closest.dead = true; gold += 2; updateUI(); }
    } else if (nearestEnemy && nearestDist > u.range * TILE * 0.8 && nearestDist <= u.range * TILE * 2.5) {
      moveTo(u, nearestEnemy.x, nearestEnemy.y, u.moveSpeed, dt);
    } else if (!nearestEnemy || nearestDist > u.range * TILE * 2.5) {
      moveTo(u, (u.homeCol+0.5)*TILE, (u.homeRow+0.5)*TILE, u.moveSpeed * 0.5, dt);
    }
  }

  // Separation
  for (let i = 0; i < units.length; i++) {
    if (!units[i].alive) continue;
    for (let j = i+1; j < units.length; j++) {
      if (!units[j].alive) continue;
      const dx = units[j].x - units[i].x, dy = units[j].y - units[i].y;
      const d = Math.hypot(dx, dy), minD = TILE * 0.72;
      if (d < minD && d > 0.1) {
        const push = (minD - d) / 2;
        units[i].x -= (dx/d)*push; units[i].y -= (dy/d)*push;
        units[j].x += (dx/d)*push; units[j].y += (dy/d)*push;
      }
    }
  }

  // --- Enemies ---
  for (const e of enemies) {
    if (e.dead || e.leaked) continue;
    if (e.flashT > 0) e.flashT -= dt;
    if (e.atkCooldown > 0) e.atkCooldown -= dt;

    let nearestUnit = null, nearestDist = Infinity;
    for (const u of units) {
      if (!u.alive) continue;
      const d = dist(e.x, e.y, u.x, u.y);
      if (d < nearestDist) { nearestUnit = u; nearestDist = d; }
    }

    if (nearestUnit && nearestDist <= TILE * 1.1) {
      // Fight
      if (e.atkCooldown <= 0) {
        e.atkCooldown = 1.0; nearestUnit.hp -= 15; nearestUnit.flashT = 0.15;
        particles.push({ x: nearestUnit.x, y: nearestUnit.y - 14, text: '-15', t:0.9, color:'#e74c3c' });
        if (nearestUnit.hp <= 0) { nearestUnit.alive = false; nearestUnit.hp = 0; }
      }
    } else if (nearestUnit && nearestDist < TILE * 5) {
      moveTo(e, nearestUnit.x, nearestUnit.y, e.speed, dt);
    } else {
      // March down lane toward exit portal (row 21)
      moveTo(e, (LANE_X + 0.5) * TILE, (EXIT_ROW + 0.5) * TILE, e.speed, dt);
    }

    // Reached exit portal (row 21 area)
    if (e.y >= EXIT_ROW * TILE) {
      e.leaked = true;
      // Teleport to king's room
      leakedEnemies.push({
        x: (KING_COLS / 2 + (Math.random()-0.5)*2) * (kCanvas._tile||32),
        y: 1.5 * (kCanvas._tile||32),
        hp: e.hp, maxHp: e.maxHp,
        speed: e.speed * 1.2,
        dead: false, flashT: 0, atkCooldown: 0,
      });
    }
  }

  // --- Leaked enemies in king's room ---
  const kt = kCanvas._tile || 32;
  const kingX = KING_COLS / 2 * kt, kingY = KING_ROWS * 0.75 * kt;
  for (const e of leakedEnemies) {
    if (e.dead) continue;
    if (e.flashT > 0) e.flashT -= dt;
    if (e.atkCooldown > 0) e.atkCooldown -= dt;
    const d = dist(e.x, e.y, kingX, kingY);
    if (d <= kt * 1.2) {
      if (e.atkCooldown <= 0) {
        e.atkCooldown = 1.5;
        kingHp = Math.max(0, kingHp - 8);
        kingParticles.push({ x: kingX + (Math.random()-0.5)*kt, y: kingY - kt*0.5, text: '-8', t:1.2, color:'#e74c3c' });
        updateUI();
        if (kingHp <= 0) { phase = 'gameover'; return; }
      }
    } else {
      moveTo(e, kingX, kingY, e.speed * 1.5, dt);
    }
  }

  // Particles
  particles = particles.filter(p => p.t > 0);
  for (const p of particles) { p.t -= dt; p.y -= 20 * dt; }
  kingParticles = kingParticles.filter(p => p.t > 0);
  for (const p of kingParticles) { p.t -= dt; p.y -= 20 * dt; }

  // Wave done?
  const mainAlive = enemies.filter(e => !e.dead && !e.leaked);
  const kingRoomAlive = leakedEnemies.filter(e => !e.dead);
  if (mainAlive.length === 0 && kingRoomAlive.length === 0 && enemies.length > 0) {
    const leaks = enemies.filter(e => e.leaked).length;
    const income = 10 + wave + (leaks === 0 ? 5 : 0);
    gold += income; wave++; enemies = []; leakedEnemies = [];
    particles.push({ x: canvas.width/2, y: canvas.height/2, text: leaks === 0 ? `✓ CLEAN! +${income}g` : `WAVE DONE +${10+wave-1}g`, t:2.2, color: leaks===0?'#2ecc71':'#f1c40f', big:true });
    updateUI();
    setTimeout(startBuildPhase, 2000);
    phase = 'income';
  }
}

// ---- DRAW MAIN CANVAS ----
function draw() {
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Spawn zone (row 0)
  ctx.fillStyle = 'rgba(231,76,60,0.15)';
  ctx.fillRect(0, 0, canvas.width, TILE);
  ctx.fillStyle = 'rgba(231,76,60,0.6)';
  ctx.font = `${Math.floor(TILE*0.4)}px Segoe UI`; ctx.textAlign = 'center';
  ctx.fillText('SPAWN', canvas.width/2, TILE*0.65);

  // Exit portal zone (rows 20-21)
  ctx.fillStyle = 'rgba(155,89,182,0.15)';
  ctx.fillRect(0, 20*TILE, canvas.width, 2*TILE);
  // Portal effect
  const portalX = (LANE_X + 0.5) * TILE, portalY = (EXIT_ROW - 0.3) * TILE;
  const grad = ctx.createRadialGradient(portalX, portalY, 2, portalX, portalY, TILE*0.9);
  grad.addColorStop(0, 'rgba(155,89,182,0.9)');
  grad.addColorStop(0.5, 'rgba(155,89,182,0.4)');
  grad.addColorStop(1, 'rgba(155,89,182,0)');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.ellipse(portalX, portalY, TILE*0.9, TILE*0.6, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(200,150,255,0.9)';
  ctx.font = `bold ${Math.floor(TILE*0.38)}px Segoe UI`; ctx.textAlign = 'center';
  ctx.fillText('EXIT PORTAL', canvas.width/2, ROWS*TILE - TILE*0.3);

  // Play area background (rows 1-19)
  ctx.fillStyle = 'rgba(255,255,255,0.02)';
  ctx.fillRect(0, TILE, canvas.width, 19*TILE);

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 0.5;
  for (let c = 0; c <= COLS; c++) { ctx.beginPath(); ctx.moveTo(c*TILE,0); ctx.lineTo(c*TILE,canvas.height); ctx.stroke(); }
  for (let r = 0; r <= ROWS; r++) { ctx.beginPath(); ctx.moveTo(0,r*TILE); ctx.lineTo(canvas.width,r*TILE); ctx.stroke(); }

  // Lane hint
  ctx.fillStyle = 'rgba(255,255,255,0.025)';
  ctx.fillRect(LANE_COL*TILE, TILE, 2*TILE, 19*TILE);

  // Lane arrows
  ctx.fillStyle = 'rgba(255,255,255,0.07)';
  ctx.font = `${Math.floor(TILE*0.45)}px sans-serif`; ctx.textAlign = 'center';
  for (let r = 2; r < 20; r += 3) ctx.fillText('▼', (LANE_X+0.5)*TILE, (r+0.7)*TILE);

  // Hover
  if (hoverCell && phase === 'build' && selectedType) {
    const {col,row} = hoverCell;
    ctx.fillStyle = isPlayArea(col,row) ? 'rgba(255,255,255,0.1)' : 'rgba(255,0,0,0.15)';
    ctx.fillRect(col*TILE,row*TILE,TILE,TILE);
    if (isPlayArea(col,row)) {
      ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc((col+0.5)*TILE,(row+0.5)*TILE,UNIT_DEFS[selectedType].range*TILE,0,Math.PI*2); ctx.stroke();
    }
  }

  // Home markers during combat
  if (phase === 'combat') {
    for (const u of units) {
      ctx.strokeStyle=`${u.color}44`; ctx.lineWidth=1; ctx.setLineDash([3,3]);
      ctx.strokeRect(u.homeCol*TILE+4,u.homeRow*TILE+4,TILE-8,TILE-8);
      ctx.setLineDash([]);
    }
  }

  // Units
  for (const u of units) {
    if (!u.alive && phase==='combat') continue;
    if (hoverCell && hoverCell.col===u.homeCol && hoverCell.row===u.homeRow) {
      ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(u.x,u.y,u.range*TILE,0,Math.PI*2); ctx.stroke();
    }
    const r = TILE*0.37;
    ctx.fillStyle = u.flashT>0 ? '#fff' : u.color;
    ctx.beginPath(); ctx.arc(u.x,u.y,r,0,Math.PI*2); ctx.fill();
    const hpR = u.hp/u.maxHp;
    ctx.fillStyle='#111'; ctx.fillRect(u.x-r, u.y-r-5, r*2, 3);
    ctx.fillStyle = hpR>0.5?'#2ecc71':hpR>0.25?'#f39c12':'#e74c3c';
    ctx.fillRect(u.x-r, u.y-r-5, r*2*hpR, 3);
  }

  // Enemies
  for (const e of enemies) {
    if (e.dead || e.leaked) continue;
    const w=TILE*0.7,h=TILE*0.5;
    ctx.fillStyle = e.flashT>0?'#fff':'#e74c3c';
    ctx.beginPath(); ctx.roundRect(e.x-w/2,e.y-h/2,w,h,3); ctx.fill();
    const hpR=e.hp/e.maxHp;
    ctx.fillStyle='#333'; ctx.fillRect(e.x-w/2,e.y-h/2-6,w,4);
    ctx.fillStyle=hpR>0.5?'#2ecc71':hpR>0.25?'#f39c12':'#e74c3c';
    ctx.fillRect(e.x-w/2,e.y-h/2-6,w*hpR,4);
  }

  // Particles
  for (const p of particles) {
    ctx.globalAlpha=Math.min(1,p.t);
    ctx.font=p.big?'bold 20px Segoe UI':'bold 12px Segoe UI';
    ctx.fillStyle=p.color; ctx.textAlign='center';
    ctx.shadowColor='#000'; ctx.shadowBlur=p.big?8:3;
    ctx.fillText(p.text,p.x,p.y);
    ctx.shadowBlur=0; ctx.globalAlpha=1;
  }
  ctx.textAlign='left';

  if (phase==='gameover') {
    ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.textAlign='center';
    ctx.font='bold 34px Segoe UI'; ctx.fillStyle='#e74c3c';
    ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2-18);
    ctx.font='17px Segoe UI'; ctx.fillStyle='#aaa';
    ctx.fillText(`Survived ${wave-1} waves`, canvas.width/2, canvas.height/2+18);
    ctx.fillText('Refresh to restart', canvas.width/2, canvas.height/2+46);
    ctx.textAlign='left';
  }
}

// ---- DRAW KING'S ROOM ----
function drawKingRoom() {
  const kt = kCanvas._tile || 32;
  const kw = KING_COLS * kt, kh = KING_ROWS * kt;
  kCtx.fillStyle = '#0d1b2a';
  kCtx.fillRect(0, 0, kw, kh);

  // Room border
  kCtx.strokeStyle = '#8e44ad'; kCtx.lineWidth = 3;
  kCtx.strokeRect(2, 2, kw-4, kh-4);

  // Title
  kCtx.fillStyle = 'rgba(142,68,173,0.15)';
  kCtx.fillRect(2, 2, kw-4, kt*1.1);
  kCtx.fillStyle = '#c39bd3'; kCtx.font = `bold ${Math.floor(kt*0.45)}px Segoe UI`;
  kCtx.textAlign = 'center';
  kCtx.fillText("KING'S CHAMBER", kw/2, kt*0.75);

  // Grid lines (subtle)
  kCtx.strokeStyle = 'rgba(255,255,255,0.04)'; kCtx.lineWidth = 0.5;
  for (let c=0;c<=KING_COLS;c++){kCtx.beginPath();kCtx.moveTo(c*kt,0);kCtx.lineTo(c*kt,kh);kCtx.stroke();}
  for (let r=0;r<=KING_ROWS;r++){kCtx.beginPath();kCtx.moveTo(0,r*kt);kCtx.lineTo(kw,r*kt);kCtx.stroke();}

  // King
  const kingX = kw/2, kingY = kh * 0.72;
  const kingR = kt * 0.55;

  // King glow
  const glow = kCtx.createRadialGradient(kingX, kingY, 0, kingX, kingY, kingR*2);
  glow.addColorStop(0, 'rgba(255,215,0,0.3)');
  glow.addColorStop(1, 'rgba(255,215,0,0)');
  kCtx.fillStyle = glow;
  kCtx.beginPath(); kCtx.arc(kingX, kingY, kingR*2, 0, Math.PI*2); kCtx.fill();

  // King body
  kCtx.fillStyle = kingHp > 50 ? '#f39c12' : kingHp > 25 ? '#e67e22' : '#c0392b';
  kCtx.beginPath(); kCtx.arc(kingX, kingY, kingR, 0, Math.PI*2); kCtx.fill();
  kCtx.strokeStyle = '#FFD700'; kCtx.lineWidth = 2;
  kCtx.beginPath(); kCtx.arc(kingX, kingY, kingR, 0, Math.PI*2); kCtx.stroke();

  // Crown
  const crownY = kingY - kingR;
  kCtx.fillStyle = '#FFD700';
  kCtx.beginPath();
  kCtx.moveTo(kingX - kt*0.35, crownY);
  kCtx.lineTo(kingX - kt*0.35, crownY - kt*0.28);
  kCtx.lineTo(kingX - kt*0.17, crownY - kt*0.14);
  kCtx.lineTo(kingX, crownY - kt*0.32);
  kCtx.lineTo(kingX + kt*0.17, crownY - kt*0.14);
  kCtx.lineTo(kingX + kt*0.35, crownY - kt*0.28);
  kCtx.lineTo(kingX + kt*0.35, crownY);
  kCtx.closePath(); kCtx.fill();

  // King HP bar
  const barW = kw * 0.75, barH = kt * 0.35;
  const barX = (kw - barW) / 2, barY = kingY + kingR + kt * 0.2;
  const hpR = kingHp / maxKingHp;
  kCtx.fillStyle = '#222'; kCtx.fillRect(barX, barY, barW, barH);
  kCtx.fillStyle = hpR > 0.5 ? '#2ecc71' : hpR > 0.25 ? '#f39c12' : '#e74c3c';
  kCtx.fillRect(barX, barY, barW * hpR, barH);
  kCtx.strokeStyle = '#555'; kCtx.lineWidth = 1; kCtx.strokeRect(barX, barY, barW, barH);
  kCtx.fillStyle = '#fff'; kCtx.font = `bold ${Math.floor(kt*0.3)}px Segoe UI`;
  kCtx.textAlign = 'center';
  kCtx.fillText(`${kingHp} / ${maxKingHp}`, kw/2, barY + barH*0.78);

  // Leaked enemies in king's room
  for (const e of leakedEnemies) {
    if (e.dead) continue;
    const ew = kt*0.6, eh = kt*0.45;
    kCtx.fillStyle = e.flashT > 0 ? '#fff' : '#e74c3c';
    kCtx.beginPath(); kCtx.roundRect(e.x-ew/2, e.y-eh/2, ew, eh, 3); kCtx.fill();
    const eHpR = e.hp/e.maxHp;
    kCtx.fillStyle='#333'; kCtx.fillRect(e.x-ew/2, e.y-eh/2-5, ew, 3);
    kCtx.fillStyle=eHpR>0.5?'#2ecc71':eHpR>0.25?'#f39c12':'#e74c3c';
    kCtx.fillRect(e.x-ew/2, e.y-eh/2-5, ew*eHpR, 3);
  }

  // King room particles
  for (const p of kingParticles) {
    kCtx.globalAlpha = Math.min(1, p.t);
    kCtx.font = 'bold 13px Segoe UI'; kCtx.fillStyle = p.color;
    kCtx.textAlign = 'center';
    kCtx.shadowColor='#000'; kCtx.shadowBlur=4;
    kCtx.fillText(p.text, p.x, p.y);
    kCtx.shadowBlur=0; kCtx.globalAlpha=1;
  }

  // Teleport flash when enemy arrives
  kCtx.textAlign = 'left';

  // Game over overlay on king room
  if (phase === 'gameover') {
    kCtx.fillStyle = 'rgba(0,0,0,0.8)'; kCtx.fillRect(0,0,kw,kh);
    kCtx.textAlign='center';
    kCtx.font=`bold ${Math.floor(kt*0.7)}px Segoe UI`; kCtx.fillStyle='#c0392b';
    kCtx.fillText('☠', kw/2, kh/2+kt*0.2);
    kCtx.textAlign='left';
  }
}

function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  update(dt); draw(); drawKingRoom();
  requestAnimationFrame(loop);
}

startBuildPhase(); updateUI();
requestAnimationFrame(ts => { lastTime = ts; loop(ts); });
</script>
</body>
</html>
